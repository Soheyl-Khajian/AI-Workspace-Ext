<!-- src/ui/sidebar.html -->
<div id="aiw-sidebar-root" class="aiw">
  <header class="aiw-header">
    <div class="aiw-header__title">AI Workspace</div>
    <div class="aiw-header__meta">Local</div>
  </header>

  <main class="aiw-main">
    <section class="aiw-section">
      <div class="aiw-section__head">
        <div class="aiw-section__title">Projects</div>
        <button
          id="aiw-add-project-button"
          class="aiw-btn aiw-btn--primary"
          type="button"
        >
          New
        </button>
      </div>

      <!-- Optional (later): project search -->
      <!-- <input class="aiw-input" id="aiw-project-search" placeholder="Search projects" /> -->

      <div
        id="aiw-projects-list"
        class="aiw-list"
        aria-label="Projects list"
      ></div>
    </section>

    <!-- Placeholder for (items) -->
    <section class="aiw-section">
      <div class="aiw-section__head">
        <div class="aiw-section__title">Items</div>
        <div class="aiw-section__hint">Select a project</div>
        <button
          id="aiw-add-item-button"
          class="aiw-btn aiw-btn--primary"
          type="button"
        >
          New
        </button>
      </div>
      <div id="aiw-items-list" class="aiw-list" aria-label="Items list"></div>
    </section>
  </main>

  <footer class="aiw-footer">
    <button id="aiw-build-context-button" class="aiw-btn" type="button">
      Build Context
    </button>
    <button id="aiw-export-button" class="aiw-btn" type="button">Export</button>
  </footer>
</div>
